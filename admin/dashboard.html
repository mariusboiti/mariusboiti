<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <div class="admin-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">

        <h1 class="page-title">Dashboard</h1>

            <table>
              <thead><tr><th>Nume</th><th>Email</th><th>Status</th><th>Data</th></tr></thead>
              <tbody id="recent-leads"></tbody>
            </table>
          </div>
        </section>

        <section class="card" style="margin-top:1rem;">
          <h2 style="margin-top:0;">Shortcut-uri</h2>
          <div class="row">
            <a class="btn btn-secondary" href="/admin/homepage.html">Editare Homepage</a>
            <a class="btn btn-secondary" href="/admin/services.html">Editare Servicii</a>
            <a class="btn btn-secondary" href="/admin/calculator.html">Editare Calculator</a>
          </div>

      </main>
