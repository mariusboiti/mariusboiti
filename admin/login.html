<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Marius Boiti Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/admin/assets/css/admin.css?v=20260525-admin-logo-controls-v2" />
    <script defer src="/admin/assets/js/admin.js?v=20260525-admin-logo-controls-v2"></script>
  </head>
  <body data-page="login">
    <div class="login-wrap">
      <form class="login-card" id="login-form">
        <h1 class="page-title" style="margin-top:0;">Admin Login</h1>
        <p class="muted">Acces CMS Marius Boiti Studio</p>
        <div class="grid">
          <div class="field">
            <label>Email</label>
            <input name="email" type="email" required />
          </div>
          <div class="field">
            <label>Parolă</label>
            <input name="password" type="password" required />
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
        </div>
      </form>
    </div>
  </body>
</html>
